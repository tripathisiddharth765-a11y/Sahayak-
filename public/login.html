<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Central · Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0B0E13;
            --surface: #111620;
            --surface2: #181E2C;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #5B7FD4;
            --text: #E8EDF5;
            --text-dim: #8B95A8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        .login-card {
            width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 12px;
            padding: 1px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 127, 212, 0.15);
        }

        .login-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #6D8DE0;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(91, 127, 212, 0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .error-msg {
            color: #EE8080;
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background: rgba(91, 127, 212, 0.15);
            border: 1px solid rgba(91, 127, 212, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="login-card">
        <div class="logo">
            <div class="logo-box">A</div>
            <div>
                <div style="font-size: 18px; font-weight: 700; line-height: 1;">AEGIS</div>
                <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; font-weight: 500;">COMMAND
                    CENTRAL</div>
            </div>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label class="input-label">Operator Username</label>
                <input type="text" id="username" class="input-field" placeholder="Enter identifier" required
                    autocomplete="off">
            </div>

            <div class="input-group">
                <label class="input-label">Security Pass Phrase</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Initialize Connection</button>
            <div id="error" class="error-msg">⚠ Invalid operator credentials.</div>
        </form>

        <div style="margin-top: 32px; text-align: center; font-size: 11px; color: var(--text-dim);">
            Authorization Required · Level 3 Clearance
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'index.html';
                } else {
                    error.style.display = 'block';
                    setTimeout(() => error.style.display = 'none', 3000);
                }
            } catch (err) {
                console.error('Login error:', err);
                error.textContent = '⚠ Network error. Connection failed.';
                error.style.display = 'block';
            }
        });

        // Check if already logged in (optional)
        if (localStorage.getItem('isLoggedIn') === 'true') {
            // Un-comment if you want auto-redirect
            // window.location.href = '/';
        }
    </script>
</body>

</html>
